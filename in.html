<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>In Phiếu Thu</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root{
      --primary:#dc2626;--primary-light:#fef2f2;--primary-dark:#b91c1c;
      --bg:#f1f5f9;--surface:#fff;--border:#e2e8f0;
      --text:#0f172a;--muted:#64748b;--success:#16a34a;--warn:#d97706;
      --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',Arial,sans-serif;font-size:14px;background:var(--bg);color:var(--text);min-height:100vh;}

    .app-header{background:linear-gradient(135deg,#7f1d1d 0%,#dc2626 60%,#f87171 100%);color:#fff;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(220,38,38,.3);}
    .app-header h1{font-size:18px;font-weight:700;}
    .app-header .sub{font-size:12px;opacity:.75;margin-top:2px;}
    .btn-home{background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:background .15s;}
    .btn-home:hover{background:rgba(255,255,255,.3);}

    .app-body{max-width:1100px;margin:24px auto;padding:0 16px;}

    .tab-bar{display:flex;gap:4px;background:var(--surface);border-radius:var(--radius);padding:5px;box-shadow:var(--shadow);margin-bottom:20px;width:fit-content;}
    .tab{padding:9px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .15s;}
    .tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(220,38,38,.3);}

    .status-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:14px;}
    .dot{width:8px;height:8px;border-radius:50%;background:#94a3b8;}
    .dot.ok{background:var(--success);}
    .dot.err{background:var(--primary);}
    .dot.loading{background:var(--warn);animation:pulse 1s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

    .toolbar{background:var(--surface);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .filter-group{display:flex;align-items:center;gap:7px;}
    .filter-group label{font-size:12px;font-weight:700;color:var(--muted);}
    .filter-group select{border:1.5px solid var(--border);border-radius:7px;padding:6px 10px;font-size:13px;outline:none;min-width:130px;}
    .fp-date{border:1.5px solid var(--border);border-radius:7px;padding:6px 10px;font-size:13px;outline:none;transition:border .2s;min-width:130px;background:#fff;cursor:pointer;}
    .fp-date:focus{border-color:var(--primary);}
    .period-preview{font-size:12px;color:var(--primary);font-weight:600;background:var(--primary-light);border:1.5px solid #fca5a5;border-radius:7px;padding:5px 12px;white-space:nowrap;}
    /* Flatpickr overrides — chữ to cho người lớn */
    .flatpickr-calendar{font-size:15px !important;width:320px !important;box-shadow:0 8px 32px rgba(0,0,0,.18) !important;border-radius:12px !important;}
    .flatpickr-months{padding:6px 0 !important;}
    .flatpickr-month{height:42px !important;}
    .flatpickr-current-month{font-size:15px !important;padding-top:8px !important;}
    .flatpickr-weekday{font-size:13px !important;font-weight:700 !important;}
    .flatpickr-day{height:38px !important;line-height:38px !important;font-size:14px !important;border-radius:8px !important;}
    .flatpickr-day.selected,.flatpickr-day.selected:hover{background:var(--primary) !important;border-color:var(--primary) !important;}
    .flatpickr-day:hover{background:var(--primary-light) !important;}
    .flatpickr-prev-month,.flatpickr-next-month{padding:10px !important;}
    .flatpickr-prev-month svg,.flatpickr-next-month svg{width:16px;height:16px;}
    .search-box{position:relative;flex:1;min-width:180px;}
    .search-box svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;stroke:var(--muted);}
    .search-box input{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:7px 10px 7px 30px;font-size:13px;outline:none;transition:border .2s;}
    .search-box input:focus{border-color:var(--primary);}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:background .15s,transform .1s;white-space:nowrap;}
    .btn:active{transform:scale(.96);}
    .btn-print{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(220,38,38,.3);margin-left:auto;}
    .btn-print:hover{background:var(--primary-dark);}

    /* Tab 1 — screen list */
    .list-screen{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
    .list-header{display:grid;grid-template-columns:36px 80px 1fr 110px 110px 120px;padding:8px 16px;background:#f8fafc;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
    .list-row{display:grid;grid-template-columns:36px 80px 1fr 110px 110px 120px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;align-items:center;}
    .list-row:last-child{border-bottom:none;}
    .list-row:hover{background:var(--primary-light);}
    .list-empty{text-align:center;padding:40px;color:var(--muted);}
    .l-stt{color:var(--muted);font-size:12px;}
    .l-ma{font-weight:700;color:var(--primary);font-size:12px;}
    .l-tong{font-weight:700;color:var(--success);text-align:right;font-size:12px;}

    /* Tab 2 */
    .single-wrap{display:grid;grid-template-columns:300px 1fr;gap:20px;}
    .kh-picker{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;height:fit-content;}
    .kh-picker-header{background:linear-gradient(90deg,#dc2626,#f87171);padding:12px 16px;color:#fff;font-weight:700;font-size:13px;}
    .kh-picker-search{padding:10px 12px;border-bottom:1px solid var(--border);}
    .kh-picker-search input{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px;outline:none;}
    .kh-picker-search input:focus{border-color:var(--primary);}
    .kh-list{max-height:520px;overflow-y:auto;}
    .kh-row{padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;font-size:13px;}
    .kh-row:hover{background:var(--primary-light);}
    .kh-row.active{background:#fee2e2;border-left:3px solid var(--primary);}
    .kh-row .kh-ma{font-size:11px;color:var(--muted);font-weight:600;}
    .kh-row .kh-ten{font-weight:600;}

    .receipt-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);}
    .receipt-empty{display:flex;align-items:center;justify-content:center;height:300px;color:var(--muted);font-size:14px;}
    .print-receipt-btn{display:flex;justify-content:center;padding:20px 36px;border-top:1px solid var(--border);}

    /* ── Receipt (dual layout) — black & white ── */
    .receipt{padding:20px 24px;font-size:13px;}
    .r-dual{display:flex;align-items:stretch;width:100%;gap:0;}
    .r-half{flex:1;min-width:0;padding:0 14px;}
    .r-half:first-child{padding-left:0;}
    .r-half:last-child{padding-right:0;}
    .r-divider{width:1px;flex-shrink:0;background:repeating-linear-gradient(to bottom,#555 0,#555 5px,transparent 5px,transparent 10px);margin:0 2px;}

    .r-header{text-align:center;margin-bottom:12px;}
    .r-org{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.5px;}
    .r-title{font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;color:#000;margin:4px 0 2px;}
    .r-period{font-size:12px;font-weight:600;color:#000;}

    .r-section{margin-bottom:11px;}
    .r-section-title{background:#222;color:#fff;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:3px;margin-bottom:6px;}
    .r-kv{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;}
    .r-kv-full{grid-column:span 2;}
    .kv{display:flex;gap:4px;align-items:baseline;}
    .kv-label{font-size:11px;color:#555;white-space:nowrap;min-width:72px;}
    .kv-value{font-size:12px;font-weight:600;color:#000;}
    .kv-value.big{font-size:14px;font-weight:700;color:#000;}

    .r-cs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
    .r-cs-chip{background:#f5f5f5;border:1.5px solid #ccc;border-radius:6px;padding:6px 8px;text-align:center;}
    .r-cs-chip .cs-label{font-size:9px;color:#555;text-transform:uppercase;font-weight:700;letter-spacing:.3px;}
    .r-cs-chip .cs-val{font-size:15px;font-weight:800;margin-top:2px;color:#000;}
    .r-cs-chip.hi{background:#e8e8e8;border-color:#999;}
    .r-cs-chip.hi .cs-val{color:#000;}

    .r-table{width:100%;border-collapse:collapse;font-size:12px;}
    .r-table th{background:#e8e8e8;padding:5px 7px;text-align:left;font-size:10px;font-weight:700;color:#333;text-transform:uppercase;border-bottom:2px solid #999;}
    .r-table th.r,.r-table td.r{text-align:right;}
    .r-table td{padding:6px 7px;border-bottom:1px solid #ddd;color:#000;}
    .r-table tr:last-child td{border-bottom:none;}

    .r-totals{border-top:2px solid #999;padding-top:8px;margin-top:2px;}
    .r-total-row{display:flex;justify-content:space-between;padding:3px 1px;font-size:12px;color:#000;}
    .r-total-row.danger{color:#000;font-weight:600;}
    .r-total-big{display:flex;justify-content:space-between;padding:6px 1px;font-size:14px;font-weight:800;color:#000;border-top:2px solid #000;margin-top:5px;}
    .r-words{background:#f0f0f0;border:1.5px solid #bbb;border-radius:6px;padding:6px 10px;margin-top:8px;}
    .r-words span{font-size:9px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:2px;}
    .r-words em{font-style:italic;font-weight:600;font-size:11.5px;color:#000;}

    .r-footer{margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:center;font-size:11px;color:#555;}
    .r-footer-col{border-top:1px dashed #aaa;padding-top:6px;}
    .r-footer-col strong{display:block;margin-bottom:28px;font-size:12px;font-weight:700;color:#000;}

    .r-note{margin-top:10px;padding-top:8px;border-top:1px dashed #aaa;color:#555;}
    .r-note em{font-style:italic;font-size:11px;line-height:1.5;}

    /* Batch print wrapper */
    #batchPrint{display:none;}
    .r-page{break-after:page;}
    .r-page:last-child{break-after:auto;}

    /* ── Print ── */
    @media print {
      @page{size:A5 landscape;margin:5mm 6mm;}
      body{background:#fff !important;font-family:'Inter',Arial,sans-serif;}
      .app-header,.tab-bar,.toolbar,.status-bar,.no-print{display:none !important;}
      .app-body{margin:0;padding:0;max-width:none;}

      body[data-tab="1"] .list-screen{display:none !important;}
      body[data-tab="1"] #batchPrint{display:block !important;}
      body[data-tab="2"] .single-wrap{display:block !important;}
      body[data-tab="2"] .kh-picker{display:none !important;}
      body[data-tab="2"] .receipt-wrap{box-shadow:none !important;border-radius:0 !important;}
      body[data-tab="2"] .print-receipt-btn{display:none !important;}

      .receipt{padding:0;max-width:none;}
      .r-dual{display:flex !important;width:100%;align-items:stretch;}
      .r-half{flex:1;min-width:0;padding:0 3mm;}
      .r-half:first-child{padding-left:0;}
      .r-half:last-child{padding-right:0;}
      .r-divider{
        width:1px;flex-shrink:0;margin:0 1mm;
        background:repeating-linear-gradient(to bottom,#888 0,#888 4px,transparent 4px,transparent 8px) !important;
        -webkit-print-color-adjust:exact;print-color-adjust:exact;
      }

      .r-header{margin-bottom:4px;}
      .r-org{font-size:6.5pt;color:#555;}
      .r-title{font-size:9.5pt;margin:2px 0 1px;color:#000;}
      .r-period{font-size:7.5pt;color:#000;}

      .r-section{margin-bottom:4px;}
      .r-section-title{
        font-size:6.5pt;padding:1.5px 6px;margin-bottom:3px;
        background:#222 !important;color:#fff !important;
        -webkit-print-color-adjust:exact;print-color-adjust:exact;
      }
      .r-kv{gap:1.5px 8px;}
      .kv-label{font-size:6.5pt;min-width:52px;color:#555;}
      .kv-value{font-size:7.5pt;color:#000;}
      .kv-value.big{font-size:8.5pt;font-weight:700;color:#000;}

      .r-cs-grid{gap:3px;}
      .r-cs-chip{padding:3px 4px;border-radius:2px;border:1px solid #ccc;background:#f5f5f5 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
      .cs-label{font-size:6pt;color:#555;}
      .cs-val{font-size:9.5pt;margin-top:1px;color:#000;}
      .r-cs-chip.hi{background:#e0e0e0 !important;border-color:#999 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
      .r-cs-chip.hi .cs-val{color:#000 !important;}

      .r-table{font-size:7pt;}
      .r-table th{padding:2.5px 5px;font-size:6pt;background:#e0e0e0 !important;color:#000 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
      .r-table td{padding:2.5px 5px;color:#000;}

      .r-totals{padding-top:4px;}
      .r-total-row{padding:1.5px 0;font-size:7.5pt;color:#000;}
      .r-total-row.danger{color:#000;font-weight:600;}
      .r-total-big{
        font-size:9.5pt;padding:3.5px 0;margin-top:3px;
        color:#000 !important;border-top:1.5px solid #000 !important;
      }
      .r-words{
        padding:3px 7px;margin-top:4px;
        background:#f0f0f0 !important;border:1px solid #bbb !important;
        -webkit-print-color-adjust:exact;print-color-adjust:exact;
      }
      .r-words span{font-size:6pt;color:#555;}
      .r-words em{font-size:7.5pt;color:#000;}

      .r-footer{margin-top:7px;gap:5px;font-size:7.5pt;color:#555;}
      .r-footer-col strong{margin-bottom:12px;font-size:7.5pt;color:#000;}

      .r-note{margin-top:5px;padding-top:4px;border-top:1px dashed #888 !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
      .r-note em{font-size:7pt;color:#555;}
    }
  </style>
</head>
<body data-tab="1">
<div class="app-header no-print">
  <div><h1>🖨️ In Phiếu Thu</h1><div class="sub">In phiếu từng người hoặc cả danh sách</div></div>
  <a class="btn-home" href="index.html">⌂ Trang chủ</a>
</div>

<div class="app-body">
  <div class="status-bar no-print"><div class="dot" id="dot"></div><span id="statusText">Đang tải...</span></div>

  <div class="tab-bar no-print">
    <button class="tab active" id="tab1" onclick="switchTab(1)">📋 In Danh Sách</button>
    <button class="tab" id="tab2" onclick="switchTab(2)">🧾 In Từng Người</button>
  </div>

  <!-- Chọn kỳ in (dùng chung cho cả 2 tab) -->
  <div class="toolbar no-print" style="margin-bottom:16px;">
    <div class="filter-group">
      <label>Từ ngày:</label>
      <input type="text" id="dateFrom" class="fp-date" placeholder="DD/MM/YYYY" readonly/>
    </div>
    <div class="filter-group">
      <label>Đến ngày:</label>
      <input type="text" id="dateTo" class="fp-date" placeholder="DD/MM/YYYY" readonly/>
    </div>
    <span class="period-preview" id="periodPreview">Tháng hiện tại</span>
  </div>

  <!-- ── TAB 1 ── -->
  <div id="view1">
    <div class="toolbar no-print">
      <div class="filter-group">
        <label>Thôn:</label>
        <select id="f1Thon" onchange="renderList1()"><option value="">Tất cả</option></select>
      </div>
      <div class="filter-group">
        <label>Trạm:</label>
        <select id="f1Tram" onchange="renderList1()"><option value="">Tất cả</option></select>
      </div>
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="f1Search" placeholder="Tìm mã KH, họ tên..." oninput="renderList1()"/>
      </div>
      <span id="countBadge" style="font-size:12px;color:var(--muted);font-weight:600;"></span>
      <button class="btn btn-print" onclick="doPrint()">🖨️ In tất cả phiếu</button>
    </div>

    <div class="list-screen">
      <div class="list-header">
        <span>#</span><span>Mã KH</span><span>Họ tên</span><span>Thôn</span><span>Trạm</span><span style="text-align:right;">Tổng cộng</span>
      </div>
      <div id="screenList"></div>
    </div>

    <div id="batchPrint"></div>
  </div>

  <!-- ── TAB 2 ── -->
  <div id="view2" style="display:none;">
    <div class="single-wrap">
      <div class="kh-picker no-print">
        <div class="kh-picker-header">Chọn khách hàng</div>
        <div class="kh-picker-search">
          <input type="text" id="f2Search" placeholder="Tìm mã KH, họ tên..." oninput="renderPicker()"/>
        </div>
        <div class="kh-list" id="khList"></div>
      </div>
      <div class="receipt-wrap">
        <div class="receipt-empty" id="receiptEmpty">← Chọn khách hàng để xem phiếu</div>
        <div id="receiptContent" style="display:none;">
          <div class="receipt" id="receiptBody"></div>
          <div class="print-receipt-btn no-print">
            <button class="btn btn-print" onclick="doPrint()">🖨️ In phiếu</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="config.js"></script>
<script>
  let allRecords = [], selectedIdx = -1;
  let globalDien = JSON.parse(localStorage.getItem('dien_global') || '{}');
  const fmt  = n => (parseFloat(n)||0).toLocaleString('vi-VN');
  const fmtD = n => (parseFloat(n)||0).toLocaleString('vi-VN') + ' đ';

  function setStatus(s, t) {
    document.getElementById('dot').className = 'dot'+(s==='ok'?' ok':s==='err'?' err':' loading');
    document.getElementById('statusText').textContent = t;
  }

  async function loadDien() {
    try {
      const rows = await gasGet('Dien');
      if (rows && rows.length > 0) {
        const r = rows[0];
        globalDien = { dien_sx: r.dien_sx, dien_mdk: r.dien_mdk, dinh_muc: r.dinh_muc };
        localStorage.setItem('dien_global', JSON.stringify({ ...globalDien, savedAt: new Date().toLocaleString('vi-VN') }));
      }
    } catch { /* giữ nguyên cache localStorage */ }
  }

  async function loadData() {
    setStatus('loading','Đang tải...');
    await loadDien();
    try {
      allRecords = await gasGet('KhachHang');
      setStatus('ok',`Đã tải ${allRecords.length} khách hàng`);
      buildFilters();
      renderList1();
      renderPicker();
    } catch(e) { setStatus('err',e.message); }
  }

  function buildFilters() {
    const thons = [...new Set(allRecords.map(r=>r.Thon).filter(Boolean))].sort();
    const trams = [...new Set(allRecords.map(r=>r.Tram).filter(Boolean))].sort();
    const addOpts = (id, arr) => { const s=document.getElementById(id); arr.forEach(v=>{ const o=document.createElement('option'); o.value=o.text=v; s.appendChild(o); }); };
    addOpts('f1Thon', thons); addOpts('f1Tram', trams);
  }

  function canPrint(r) {
    // Chỉ in khi tổng cộng > 0
    return (parseFloat(r.TongCong) || 0) > 0;
  }

  function getFiltered() {
    const thon = document.getElementById('f1Thon').value;
    const tram = document.getElementById('f1Tram').value;
    const q    = document.getElementById('f1Search').value.trim().toLowerCase();
    const from = document.getElementById('dateFrom').value;
    const to   = document.getElementById('dateTo').value;
    return allRecords.filter(r => {
      if (!canPrint(r)) return false;
      if (from || to) {
        const d = r.NgayCapNhat || '';
        if (from && d < from) return false;
        if (to   && d > to)   return false;
      }
      if (thon && r.Thon !== thon) return false;
      if (tram && r.Tram !== tram) return false;
      if (q && !(r.MaKH||'').toLowerCase().includes(q) && !(r.HoTen||'').toLowerCase().includes(q)) return false;
      return true;
    });
  }

  // ── Số thành chữ tiếng Việt ──
  function soThanhChu(amount) {
    const dv = ['','một','hai','ba','bốn','năm','sáu','bảy','tám','chín'];
    function nhom(n, dau) {
      if (!n) return '';
      const h=Math.floor(n/100), t=Math.floor((n%100)/10), u=n%10;
      let s='';
      if (h) s+=dv[h]+' trăm';
      else if (!dau) s+='không trăm';
      if (t>1)      { s+=(s?' ':'')+dv[t]+' mươi'; if(u===1)s+=' mốt'; else if(u===5)s+=' lăm'; else if(u)s+=' '+dv[u]; }
      else if (t===1){ s+=(s?' ':'')+'mười'; if(u===5)s+=' lăm'; else if(u)s+=' '+dv[u]; }
      else if (u)    { s+=(s&&h?' lẻ ':s?' ':'')+dv[u]; }
      return s.trim();
    }
    let n=Math.round(parseFloat(amount)||0);
    if(!n) return 'Không đồng';
    const ty=Math.floor(n/1e9); n%=1e9;
    const tr=Math.floor(n/1e6); n%=1e6;
    const ng=Math.floor(n/1e3); const le=n%1e3;
    let r='';
    if(ty) r+=nhom(ty,true)+' tỷ';
    if(tr) r+=(r?' ':'')+nhom(tr,!r)+' triệu';
    if(ng) r+=(r?' ':'')+nhom(ng,!r)+' nghìn';
    if(le) r+=(r?' ':'')+nhom(le,!r);
    return r.charAt(0).toUpperCase()+r.slice(1)+' đồng';
  }

  // ── Kỳ in ──
  function fmtDate(d) {
    if (!d) return '';
    const [y, m, day] = d.split('-');
    return `${day}/${m}/${y}`;
  }

  function getPeriodText() {
    const from = document.getElementById('dateFrom').value;
    const to   = document.getElementById('dateTo').value;
    if (from && to)  return `${fmtDate(from)} -> ${fmtDate(to)}`;
    if (from)        return `Từ ${fmtDate(from)}`;
    if (to)          return `Đến ${fmtDate(to)}`;
    const now = new Date();
    return `Tháng ${now.getMonth()+1} năm ${now.getFullYear()}`;
  }

  function onPeriodChange() {
    document.getElementById('periodPreview').textContent = getPeriodText();
    renderList1();
    renderPicker();
    if (selectedIdx >= 0) selectKH(selectedIdx);
  }

  // ── Nội dung một nửa phiếu ──
  function halfHTML(r, title, showNote, showFooter) {
    const giaSX  = parseFloat(globalDien.dien_sx)  || 0;
    const giaMDK = parseFloat(globalDien.dien_mdk) || 0;
    const dinhMuc= parseFloat(globalDien.dinh_muc) || 0;
    const period = getPeriodText();
    const tieu   = (parseFloat(r.ChiSoMoi)||0)-(parseFloat(r.ChiSoCu)||0);
    const sdt    = r.SoDT  ? `<div class="kv"><span class="kv-label">SĐT:</span><span class="kv-value">${r.SoDT}</span></div>`  : '';
    const zalo   = r.Zalo  ? `<div class="kv"><span class="kv-label">Zalo:</span><span class="kv-value">${r.Zalo}</span></div>` : '';
    const note   = showNote
      ? `<div class="r-note"><em>* Khi nhận được giấy này, vui lòng nộp tiền trong vòng 5 ngày kể từ ngày nhận giấy!!!</em></div>`
      : '';
    return `
    <div class="r-header">
      <div class="r-org">HTX Dịch Vụ / Tổ Quản Lý Điện</div>
      <div class="r-title">${title}</div>
      <div class="r-period">${period}</div>
    </div>
    <div class="r-section">
      <div class="r-section-title">Thông tin khách hàng</div>
      <div class="r-kv">
        <div class="kv r-kv-full"><span class="kv-label">Họ tên:</span><span class="kv-value big">${r.HoTen||'—'}</span></div>
        <div class="kv"><span class="kv-label">Mã KH:</span><span class="kv-value">${r.MaKH||'—'}</span></div>
        <div class="kv"><span class="kv-label">Số CT:</span><span class="kv-value">${r.SoCongTo||'—'}</span></div>
        <div class="kv r-kv-full"><span class="kv-label">Địa chỉ:</span><span class="kv-value">${r.DiaChi||'—'}</span></div>
        <div class="kv"><span class="kv-label">Thôn / Buôn:</span><span class="kv-value">${r.Thon||'—'}</span></div>
        <div class="kv"><span class="kv-label">Trạm:</span><span class="kv-value">${r.Tram||'—'}</span></div>
        ${sdt}${zalo}
      </div>
    </div>
    <div class="r-section">
      <div class="r-section-title">Chỉ số công tơ</div>
      <div class="r-cs-grid">
        <div class="r-cs-chip"><div class="cs-label">CS Cũ</div><div class="cs-val">${fmt(r.ChiSoCu)}</div></div>
        <div class="r-cs-chip"><div class="cs-label">CS Mới</div><div class="cs-val">${fmt(r.ChiSoMoi)}</div></div>
        <div class="r-cs-chip hi"><div class="cs-label">Tiêu thụ</div><div class="cs-val">${fmt(tieu)} kWh</div></div>
      </div>
    </div>
    <div class="r-section">
      <div class="r-section-title">Chi tiết tính tiền</div>
      <table class="r-table">
        <thead><tr>
          <th>Hạng mục</th><th class="r">kWh</th><th class="r">Đơn giá</th><th class="r">Thành tiền</th>
        </tr></thead>
        <tbody>
          <tr>
            <td>Trong định mức</td>
            <td class="r">${fmt(r.DienSXTieuThu)}</td>
            <td class="r">${fmt(giaSX)}</td>
            <td class="r"><strong>${fmtD(r.ThanhTienSX)}</strong></td>
          </tr>
          <tr>
            <td>Ngoài định mức</td>
            <td class="r">${fmt(r.DienMDKTieuThu)}</td>
            <td class="r">${fmt(giaMDK)}</td>
            <td class="r"><strong>${fmtD(r.ThanhTienMDK)}</strong></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="r-totals">
      <div class="r-total-row"><span>Cộng tiền điện</span><strong>${fmtD(r.CongTien)}</strong></div>
      <div class="r-total-row danger"><span>Nợ kỳ trước</span><strong>${fmtD(r.NoCu)}</strong></div>
      <div class="r-total-big"><span>TỔNG CỘNG</span><span>${fmtD(r.TongCong)}</span></div>
      <div class="r-words"><span>Bằng chữ</span><em>${soThanhChu(r.TongCong)}</em></div>
    </div>
    ${showFooter ? `<div class="r-footer">
      <div class="r-footer-col"><strong>Người thu tiền</strong>(Ký, ghi rõ họ tên)</div>
      <div class="r-footer-col"><strong>Người nộp tiền</strong>(Ký, ghi rõ họ tên)</div>
    </div>` : ''}
    ${note}`;
  }

  // ── HTML phiếu thu — 2 nửa chia đôi A5 ngang ──
  function receiptHTML(r) {
    return `<div class="r-dual">
      <div class="r-half">${halfHTML(r, 'Giấy Nộp Tiền Điện', false, true)}</div>
      <div class="r-divider"></div>
      <div class="r-half">${halfHTML(r, 'Giấy Thông Báo Tiền Điện', true, false)}</div>
    </div>`;
  }

  // ── Tab 1: Danh sách ──
  function renderList1() {
    const rows = getFiltered();
    document.getElementById('countBadge').textContent = `${rows.length} phiếu`;

    const sl = document.getElementById('screenList');
    if (!rows.length) {
      sl.innerHTML = '<div class="list-empty">Không có dữ liệu.</div>';
    } else {
      sl.innerHTML = rows.map((r,i) => `
        <div class="list-row">
          <span class="l-stt">${i+1}</span>
          <span class="l-ma">${r.MaKH||'—'}</span>
          <span>${r.HoTen||'—'}</span>
          <span style="color:var(--muted);font-size:12px;">${r.Thon||'—'}</span>
          <span style="color:var(--muted);font-size:12px;">${r.Tram||'—'}</span>
          <span class="l-tong">${fmtD(r.TongCong)}</span>
        </div>`).join('');
    }

    document.getElementById('batchPrint').innerHTML = rows.map(r =>
      `<div class="r-page"><div class="receipt">${receiptHTML(r)}</div></div>`
    ).join('');
  }

  // ── Tab 2: Picker & Receipt ──
  function renderPicker() {
    const q = document.getElementById('f2Search').value.trim().toLowerCase();
    const printable = allRecords.filter(canPrint);
    const list = q ? printable.filter(r=>(r.MaKH||'').toLowerCase().includes(q)||(r.HoTen||'').toLowerCase().includes(q)) : printable;
    const wrap = document.getElementById('khList');
    if (!list.length) { wrap.innerHTML='<div class="kh-row" style="color:var(--muted);">Không tìm thấy.</div>'; return; }
    wrap.innerHTML = list.map(r => {
      const idx = allRecords.indexOf(r);
      return `<div class="kh-row${idx===selectedIdx?' active':''}" onclick="selectKH(${idx})">
        <div class="kh-ma">${r.MaKH||'—'}</div>
        <div class="kh-ten">${r.HoTen||'—'}</div>
      </div>`;
    }).join('');
  }

  function selectKH(idx) {
    selectedIdx = idx;
    renderPicker();
    document.getElementById('receiptEmpty').style.display = 'none';
    document.getElementById('receiptContent').style.display = '';
    document.getElementById('receiptBody').innerHTML = receiptHTML(allRecords[idx]);
  }

  // ── Tab switch ──
  function switchTab(n) {
    document.body.dataset.tab = n;
    document.getElementById('view1').style.display = n===1?'':'none';
    document.getElementById('view2').style.display = n===2?'':'none';
    document.getElementById('tab1').className = 'tab'+(n===1?' active':'');
    document.getElementById('tab2').className = 'tab'+(n===2?' active':'');
  }

  loadData();

  // ── Flatpickr — lịch tiếng Việt ──
  const viLocale = {
    weekdays: {
      shorthand: ['CN','T2','T3','T4','T5','T6','T7'],
      longhand:  ['Chủ Nhật','Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy']
    },
    months: {
      shorthand: ['Th.1','Th.2','Th.3','Th.4','Th.5','Th.6','Th.7','Th.8','Th.9','Th.10','Th.11','Th.12'],
      longhand:  ['Tháng Một','Tháng Hai','Tháng Ba','Tháng Tư','Tháng Năm','Tháng Sáu',
                  'Tháng Bảy','Tháng Tám','Tháng Chín','Tháng Mười','Tháng Mười Một','Tháng Mười Hai']
    },
    firstDayOfWeek: 1,
    ordinal: () => ''
  };

  const fpOpts = {
    locale: viLocale,
    dateFormat: 'Y-m-d',
    altInput: true,
    altFormat: 'd/m/Y',
    altInputClass: 'fp-date',
    onChange: () => onPeriodChange()
  };
  flatpickr('#dateFrom', fpOpts);
  flatpickr('#dateTo',   fpOpts);

  // ── Kiểm tra ngày trước khi in ──
  function doPrint() {
    const from = document.getElementById('dateFrom').value;
    const to   = document.getElementById('dateTo').value;
    if (!from || !to) {
      alert('Vui lòng chọn ngày in phiếu (Từ ngày và Đến ngày) trước khi in!');
      return;
    }
    window.print();
  }
</script>
</body>
